<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analog Clock</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:#1e1e1e;
    }

    .clock{
        width:300px;
        height:300px;
        border:8px solid #fff;
        border-radius:50%;
        position:relative;
        background:#222;
    }

    .number{
        position:absolute;
        width:100%;
        height:100%;
        text-align:center;
        color:white;
        font-size:24px;
        font-weight:bold;
    }

    .number1 { transform: rotate(30deg); }
    .number2 { transform: rotate(60deg); }
    .number3 { transform: rotate(90deg); }
    .number4 { transform: rotate(120deg); }
    .number5 { transform: rotate(150deg); }
    .number6 { transform: rotate(180deg); }
    .number7 { transform: rotate(210deg); }
    .number8 { transform: rotate(240deg); }
    .number9 { transform: rotate(270deg); }
    .number10 { transform: rotate(300deg); }
    .number11 { transform: rotate(330deg); }

    .number span{
        display:inline-block;
        transform: rotate(calc(-1 * var(--rotation)));
        margin-top:10px;
    }

    .number1 span { --rotation:30deg; }
    .number2 span { --rotation:60deg; }
    .number3 span { --rotation:90deg; }
    .number4 span { --rotation:120deg; }
    .number5 span { --rotation:150deg; }
    .number6 span { --rotation:180deg; }
    .number7 span { --rotation:210deg; }
    .number8 span { --rotation:240deg; }
    .number9 span { --rotation:270deg; }
    .number10 span { --rotation:300deg; }
    .number11 span { --rotation:330deg; }

    .hand{
        position:absolute;
        bottom:50%;
        left:50%;
        transform-origin:bottom;
        transform:translateX(-50%);
        border-radius:10px;
    }

    .hour{
        width:8px;
        height:70px;
        background:white;
    }

    .minute{
        width:5px;
        height:100px;
        background:#00d9ff;
    }

    .second{
        width:2px;
        height:120px;
        background:red;
    }

    .center{
        position:absolute;
        width:15px;
        height:15px;
        background:white;
        border-radius:50%;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
    }
</style>
</head>
<body>

<div class="clock">
    <div class="number number1"><span>1</span></div>
    <div class="number number2"><span>2</span></div>
    <div class="number number3"><span>3</span></div>
    <div class="number number4"><span>4</span></div>
    <div class="number number5"><span>5</span></div>
    <div class="number number6"><span>6</span></div>
    <div class="number number7"><span>7</span></div>
    <div class="number number8"><span>8</span></div>
    <div class="number number9"><span>9</span></div>
    <div class="number number10"><span>10</span></div>
    <div class="number number11"><span>11</span></div>
    <div class="number"><span>12</span></div>

    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>

    <div class="center"></div>
</div>

<script>
function updateClock() {
    const now = new Date();

    const seconds = now.getSeconds();
    const minutes = now.getMinutes();
    const hours = now.getHours();

    const secondDeg = seconds * 6;
    const minuteDeg = minutes * 6 + seconds * 0.1;
    const hourDeg = (hours % 12) * 30 + minutes * 0.5;

    document.getElementById("second").style.transform =
        `translateX(-50%) rotate(${secondDeg}deg)`;

    document.getElementById("minute").style.transform =
        `translateX(-50%) rotate(${minuteDeg}deg)`;

    document.getElementById("hour").style.transform =
        `translateX(-50%) rotate(${hourDeg}deg)`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
